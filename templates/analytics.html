{% extends "base.html" %}

{% block title %}Analytics — Spendly{% endblock %}

{% block content %}
<div class="analytics-page">
    <div class="analytics-card">
        <div class="analytics-card-deco analytics-card-deco--tr"></div>
        <div class="analytics-card-deco analytics-card-deco--bl"></div>

        <div class="analytics-icon-wrap">
            <i data-lucide="clock" class="analytics-icon"></i>
        </div>

        <span class="analytics-badge">COMING SOON</span>

        <h1 class="analytics-title">Advanced Analytics</h1>

        <p class="analytics-body">
            We're working on powerful insights and visualizations<br>
            to help you understand your spending patterns better.
        </p>

        <div class="analytics-dots">
            <span class="analytics-dot analytics-dot--1"></span>
            <span class="analytics-dot analytics-dot--2"></span>
            <span class="analytics-dot analytics-dot--3"></span>
        </div>

        <p class="analytics-caption">We're crafting something special</p>
    </div>
</div>
{% endblock %}
